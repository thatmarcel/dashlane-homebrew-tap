name: Test Homebrew Formula

on:
    pull_request:
        branches:
            - main
    push:
        branches:
            - main

jobs:
    test_formula:
        strategy:
            matrix:
                os: [macos-latest, ubuntu-latest]
        runs-on: ${{ matrix.os }}
        steps:
            - uses: actions/checkout@v4

            - name: Install Homebrew (Linux only)
              if: runner.os == 'Linux'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y build-essential curl file git
                  sh -c "$(curl -fsSL https://raw.githubusercontent.com/Linuxbrew/install/master/install.sh)"
                  echo /home/linuxbrew/.linuxbrew/bin >> $GITHUB_PATH

            - name: Register local tap
              run: brew tap dashlane/tap $PWD

            - name: Install Dashlane CLI from rb file
              run: brew install --build-from-source dashlane/tap/dashlane-cli

            - name: Run brew tests
              run: brew test dashlane/tap/dashlane-cli
